name: Build test
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up CCache
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: ${{ runner.os }}-toolchain-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-toolchain-
        max-size: 10G

    - name: Install dependencies
      run: |
        sudo apt-get update
        bash ci.sh deps

    - name: Build LLVM
      run: |
        export USE_CCACHE=1
        bash ci.sh llvm

    - name: Build Rust
      run: |
        export USE_CCACHE=1
        bash ci.sh rust

    - name: Build binutils
      run: |
        export USE_CCACHE=1
        bash ci.sh binutils

    - name: Build kernel
      run: |
        export USE_CCACHE=1
        bash ci.sh kernel
        
