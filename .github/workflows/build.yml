name: Build test
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    
    timeout-minutes: 360

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        bash ci.sh deps

    - name: Build LLVM
      run: |
        export USE_CCACHE=1
        bash ci.sh llvm

    - name: Build Rust
      run: |
        export USE_CCACHE=1
        bash ci.sh rust

    - name: Build binutils
      run: |
        export USE_CCACHE=1
        bash ci.sh binutils

    - name: Build kernel
      run: |
        export USE_CCACHE=1
        bash ci.sh kernel

    - name: Upload Finished Toolchain
      uses: actions/upload-artifact@v4
      with:
        name: munch-llvm-rust-toolchain
        path: install/
        if-no-files-found: error
